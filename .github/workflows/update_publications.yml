name: Update Publications from Pure
on:
  schedule:
    - cron: "0 0 * * 1" # Runs every Monday at midnight
  workflow_dispatch:   # Allows manual triggering

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to allow git history for commits

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch and update publications
        env:
          PURE_AUTHOR_ID: ${{ secrets.PURE_AUTHOR_ID }}  # Set this in GitHub Secrets
        run: python update_publications.py

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-update publications from Pure" || echo "No changes"
          git push